<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Task 2: Build in 3D - Cyborg Head</title>
    <style>
        /* Reset default margin and hide scrollbars for a clean, fullscreen experience */
        body {
            margin: 0;
            overflow: hidden;
            background-color: black;
            font-family: 'Arial', sans-serif;
        }
        /* A small info label in the corner */
        #info {
            position: absolute;
            top: 20px;
            left: 20px;
            color: rgba(0, 243, 255, 0.8);
            font-size: 14px;
            background: rgba(0, 0, 0, 0.6);
            padding: 10px 15px;
            border-radius: 8px;
            border-left: 3px solid #ff00e5;
            pointer-events: none;
            user-select: none;
            backdrop-filter: blur(4px);
            z-index: 10;
        }
        #info span {
            color: #ff00e5;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div id="info">⚡ <span>CYBORG</span> NEXUS // Drag to rotate</div>

    <!-- The Three.js library and its add-ons are loaded from a CDN -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        // ----- 1. IMPORTS -----
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

        // ----- 2. SETUP SCENE, CAMERA, RENDERER -----
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050510); // Deep space blue-black

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(5, 3, 8);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2)); // Limit for performance
        renderer.toneMapping = THREE.ReinhardToneMapping;
        renderer.toneMappingExposure = 1.2;
        document.body.appendChild(renderer.domElement);

        // ----- 3. CONTROLS (For mouse interaction) -----
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true; // Smooth, inertia-like motion
        controls.dampingFactor = 0.05;
        controls.autoRotate = true;
        controls.autoRotateSpeed = 1.5;
        controls.enableZoom = true;
        controls.target.set(0, 0.5, 0);

        // ----- 4. LIGHTS -----
        // Ambient light to softly illuminate everything
        const ambientLight = new THREE.AmbientLight(0x404060);
        scene.add(ambientLight);

        // Main cool light from the front-left
        const mainLight = new THREE.DirectionalLight(0x00f3ff, 1.5);
        mainLight.position.set(2, 3, 4);
        scene.add(mainLight);

        // Warm fill light from the back-right to add contrast
        const fillLight = new THREE.DirectionalLight(0xff00e5, 0.8);
        fillLight.position.set(-3, 1, -4);
        scene.add(fillLight);

        // A rim light to highlight the edges
        const rimLight = new THREE.DirectionalLight(0xffffff, 0.5);
        rimLight.position.set(0, 2, -5);
        scene.add(rimLight);

        // A subtle point light near the head for extra glow
        const pointLight = new THREE.PointLight(0x00f3ff, 0.5, 10);
        pointLight.position.set(1, 2, 3);
        scene.add(pointLight);

        // ----- 5. CREATE THE CYBORG HEAD (Grouping primitives) -----
        const cyborgGroup = new THREE.Group();

        // --- 5a. HEAD (Main skull) ---
        const headGeo = new THREE.BoxGeometry(1.8, 2.0, 1.6);
        const headMat = new THREE.MeshStandardMaterial({
            color: 0x2a2a3a,
            roughness: 0.4,
            metalness: 0.8,
            emissive: new THREE.Color(0x111122),
            emissiveIntensity: 0.2,
        });
        const head = new THREE.Mesh(headGeo, headMat);
        head.position.y = 1.2;
        head.castShadow = true;
        head.receiveShadow = true;
        cyborgGroup.add(head);

        // --- 5b. NECK ---
        const neckGeo = new THREE.CylinderGeometry(0.6, 0.8, 0.5, 8);
        const neckMat = new THREE.MeshStandardMaterial({
            color: 0x3a3a4a,
            roughness: 0.3,
            metalness: 0.9,
        });
        const neck = new THREE.Mesh(neckGeo, neckMat);
        neck.position.y = 0.25;
        cyborgGroup.add(neck);

        // --- 5c. EYES (Glowing neon) ---
        const eyeMat = new THREE.MeshStandardMaterial({
            color: 0x00f3ff,
            emissive: 0x00f3ff,
            emissiveIntensity: 2.0,
            roughness: 0.1,
        });
        const eyeGeo = new THREE.SphereGeometry(0.25, 16, 16);

        const leftEye = new THREE.Mesh(eyeGeo, eyeMat);
        leftEye.position.set(-0.6, 1.5, 0.9);
        cyborgGroup.add(leftEye);

        const rightEye = new THREE.Mesh(eyeGeo, eyeMat);
        rightEye.position.set(0.6, 1.5, 0.9);
        cyborgGroup.add(rightEye);

        // --- 5d. EYE SOCKETS (Dark rims) ---
        const socketMat = new THREE.MeshStandardMaterial({
            color: 0x111111,
            roughness: 0.2,
            metalness: 0.9,
        });
        const socketGeo = new THREE.SphereGeometry(0.3, 16, 16);

        const leftSocket = new THREE.Mesh(socketGeo, socketMat);
        leftSocket.position.set(-0.6, 1.5, 0.8);
        leftSocket.scale.set(1, 1, 0.3);
        cyborgGroup.add(leftSocket);

        const rightSocket = new THREE.Mesh(socketGeo, socketMat);
        rightSocket.position.set(0.6, 1.5, 0.8);
        rightSocket.scale.set(1, 1, 0.3);
        cyborgGroup.add(rightSocket);

        // --- 5e. ANTENNA (With a glowing tip) ---
        const antennaMat = new THREE.MeshStandardMaterial({
            color: 0x888899,
            roughness: 0.3,
            metalness: 0.7,
        });
        const antennaGeo = new THREE.CylinderGeometry(0.04, 0.04, 0.8);
        const antenna = new THREE.Mesh(antennaGeo, antennaMat);
        antenna.position.set(0, 2.4, 0.4);
        antenna.rotation.x = 0.2;
        cyborgGroup.add(antenna);

        // Antenna tip (glowing)
        const tipMat = new THREE.MeshStandardMaterial({
            color: 0xff00e5,
            emissive: 0xff00e5,
            emissiveIntensity: 1.5,
        });
        const tipGeo = new THREE.SphereGeometry(0.08, 8, 8);
        const tip = new THREE.Mesh(tipGeo, tipMat);
        tip.position.set(0, 2.8, 0.6);
        cyborgGroup.add(tip);

        // --- 5f. JAW / MOUTH GRILLE (A line of small glowing dots) ---
        const grilleMat = new THREE.MeshStandardMaterial({
            color: 0x00f3ff,
            emissive: 0x00f3ff,
            emissiveIntensity: 0.8,
        });
        const grilleGeo = new THREE.SphereGeometry(0.06, 6, 6);
        for (let i = -0.4; i <= 0.4; i += 0.2) {
            const dot = new THREE.Mesh(grilleGeo, grilleMat);
            dot.position.set(i, 0.6, 0.9);
            cyborgGroup.add(dot);
        }

        // --- 5g. CHEEK PANELS (Decorative) ---
        const panelMat = new THREE.MeshStandardMaterial({
            color: 0x1a1a2a,
            roughness: 0.5,
            metalness: 0.6,
            emissive: new THREE.Color(0x00f3ff),
            emissiveIntensity: 0.1,
        });
        const panelGeo = new THREE.BoxGeometry(0.4, 0.1, 0.1);

        const leftPanel = new THREE.Mesh(panelGeo, panelMat);
        leftPanel.position.set(-0.9, 0.9, 0.5);
        cyborgGroup.add(leftPanel);

        const rightPanel = new THREE.Mesh(panelGeo, panelMat);
        rightPanel.position.set(0.9, 0.9, 0.5);
        cyborgGroup.add(rightPanel);

        // Add the whole cyborg to the scene
        scene.add(cyborgGroup);

        // ----- 6. ENVIRONMENT & EFFECTS -----

        // --- 6a. Glowing Grid Floor ---
        const gridHelper = new THREE.GridHelper(12, 20, 0x00f3ff, 0xff00e5);
        gridHelper.position.y = -0.5;
        gridHelper.material.opacity = 0.3;
        gridHelper.material.transparent = true;
        scene.add(gridHelper);

        // A subtle, transparent glowing circle under the robot
        const circleMat = new THREE.MeshBasicMaterial({
            color: 0x00f3ff,
            transparent: true,
            opacity: 0.08,
            side: THREE.DoubleSide,
        });
        const circleGeo = new THREE.CircleGeometry(2.5, 32);
        const circle = new THREE.Mesh(circleGeo, circleMat);
        circle.rotation.x = -Math.PI / 2;
        circle.position.y = -0.45;
        scene.add(circle);

        // --- 6b. Starfield Particle System (Background) ---
        const starsGeo = new THREE.BufferGeometry();
        const starsCount = 1500;
        const starsPos = new Float32Array(starsCount * 3);
        for (let i = 0; i < starsCount * 3; i += 3) {
            // Spread stars in a sphere of radius 50
            const r = 30 + Math.random() * 20;
            const theta = Math.random() * Math.PI * 2;
            const phi = Math.acos((Math.random() * 2) - 1);
            starsPos[i] = Math.sin(phi) * Math.cos(theta) * r;
            starsPos[i+1] = Math.sin(phi) * Math.sin(theta) * r;
            starsPos[i+2] = Math.cos(phi) * r;
        }
        starsGeo.setAttribute('position', new THREE.BufferAttribute(starsPos, 3));
        const starsMat = new THREE.PointsMaterial({
            color: 0x8888ff,
            size: 0.15,
            transparent: true,
            opacity: 0.8,
            blending: THREE.AdditiveBlending,
        });
        const stars = new THREE.Points(starsGeo, starsMat);
        scene.add(stars);

        // ----- 7. POST-PROCESSING (Bloom for the neon glow) -----
        const renderScene = new RenderPass(scene, camera);
        const bloomPass = new UnrealBloomPass(
            new THREE.Vector2(window.innerWidth, window.innerHeight),
            0.4,   // Bloom strength
            0.2,   // Bloom radius
            0.1    // Bloom threshold
        );
        const composer = new EffectComposer(renderer);
        composer.addPass(renderScene);
        composer.addPass(bloomPass);

        // ----- 8. ANIMATION LOOP -----
        function animate() {
            requestAnimationFrame(animate);

            // Auto-rotate the view if the user isn't interacting
            controls.update();

            // Subtle floating animation for the cyborg head
            const time = Date.now() * 0.001;
            cyborgGroup.position.y = Math.sin(time * 0.5) * 0.05;
            cyborgGroup.rotation.y = Math.sin(time * 0.1) * 0.05;

            // Rotate the starfield slowly for a sense of motion
            stars.rotation.y += 0.0001;

            // Render via the composer to apply bloom
            composer.render();
        }

        animate();

        // ----- 9. HANDLE WINDOW RESIZE -----
        window.addEventListener('resize', onWindowResize, false);
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            composer.setSize(window.innerWidth, window.innerHeight);
        }

        // A small console message for fun
        console.log('%c🤖 Cyborg Head 3D Scene Loaded!', 'font-size: 16px; color: #00f3ff;');
    </script>
</body>
</html>
